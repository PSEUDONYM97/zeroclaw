<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZeroClaw Command Center</title>
<style>
:root {
  --bg: #0f1117;
  --bg-card: #161822;
  --bg-input: #1c1f2e;
  --border: #2a2d3e;
  --text: #e1e4ed;
  --text-dim: #8b8fa3;
  --green: #3dd68c;
  --red: #f5555d;
  --yellow: #e5c07b;
  --orange: #d19a66;
  --blue: #61afef;
  --purple: #c678dd;
  --radius: 6px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  --mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Liberation Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Layout */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
}
.header h1 { font-size: 16px; font-weight: 600; }
.header h1 span { color: var(--green); }
.header-right { font-size: 13px; color: var(--text-dim); }
.main { padding: 24px; max-width: 1400px; margin: 0 auto; }

/* Cards grid */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.card:hover { border-color: var(--text-dim); }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-name { font-size: 15px; font-weight: 600; }
.card-meta { font-size: 13px; color: var(--text-dim); margin-top: 8px; }
.card-meta span { margin-right: 16px; }

/* Status badge */
.status {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
}
.status::before {
  content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%;
}
.status-running { color: var(--green); }
.status-running::before { background: var(--green); }
.status-stopped { color: var(--red); }
.status-stopped::before { background: var(--red); }
.status-stale-pid { color: var(--yellow); }
.status-stale-pid::before { background: var(--yellow); }
.status-dead { color: var(--orange); }
.status-dead::before { background: var(--orange); }
.status-unknown { color: var(--text-dim); }
.status-unknown::before { background: var(--text-dim); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--bg-input);
  color: var(--text); font-size: 13px; font-family: var(--font);
  cursor: pointer; transition: background 0.15s, border-color 0.15s;
}
.btn:hover { border-color: var(--text-dim); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-start { border-color: var(--green); color: var(--green); }
.btn-start:hover { background: rgba(61,214,140,0.1); }
.btn-stop { border-color: var(--red); color: var(--red); }
.btn-stop:hover { background: rgba(245,85,93,0.1); }
.btn-restart { border-color: var(--yellow); color: var(--yellow); }
.btn-restart:hover { background: rgba(229,192,123,0.1); }
.btn-primary { border-color: var(--blue); color: var(--blue); }
.btn-primary:hover { background: rgba(97,175,239,0.1); }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* Instance detail layout */
.instance-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
}
.instance-title { display: flex; align-items: center; gap: 12px; }
.instance-title h2 { font-size: 20px; font-weight: 600; }
.back-link { font-size: 13px; color: var(--text-dim); }

/* Tabs */
.tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.tab {
  padding: 8px 16px; font-size: 13px; color: var(--text-dim);
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: var(--font);
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); }

/* Panels */
.panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.panel-title { font-size: 14px; font-weight: 600; }

/* Detail rows */
.detail-grid {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 8px 16px;
  font-size: 14px;
}
.detail-label { color: var(--text-dim); }
.detail-value { font-family: var(--mono); font-size: 13px; }

/* Log viewer */
.log-viewer {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.6;
  max-height: 600px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--text-dim);
}

/* Config editor */
.config-editor {
  width: 100%;
  min-height: 400px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
  resize: vertical;
}
.config-editor:focus { outline: 1px solid var(--blue); border-color: var(--blue); }

/* Notifications */
.notify {
  padding: 10px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  margin-bottom: 12px;
}
.notify-success { background: rgba(61,214,140,0.1); border: 1px solid var(--green); color: var(--green); }
.notify-error { background: rgba(245,85,93,0.1); border: 1px solid var(--red); color: var(--red); }
.notify-warn { background: rgba(229,192,123,0.1); border: 1px solid var(--yellow); color: var(--yellow); }
.notify-info { background: rgba(97,175,239,0.1); border: 1px solid var(--blue); color: var(--blue); }

/* Diff panel */
.diff-panel {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  font-family: var(--mono);
  font-size: 12px;
  margin-top: 12px;
}
.diff-change { color: var(--yellow); }
.diff-add { color: var(--green); }
.diff-remove { color: var(--red); }

/* Table */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.data-table th {
  text-align: left; padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim); font-weight: 500;
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
}
.data-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
.data-table tr:last-child td { border-bottom: none; }

/* Usage stats */
.usage-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}
.usage-stat {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.usage-stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.usage-stat-value { font-size: 24px; font-weight: 600; margin-top: 4px; font-family: var(--mono); }

/* Loading */
.loading { color: var(--text-dim); font-size: 14px; padding: 20px 0; }
.empty-state { color: var(--text-dim); font-size: 14px; padding: 40px 0; text-align: center; }

/* Conflict dialog */
.conflict-dialog {
  background: var(--bg-card);
  border: 2px solid var(--yellow);
  border-radius: var(--radius);
  padding: 20px;
  margin-top: 12px;
}
.conflict-dialog h3 { color: var(--yellow); font-size: 14px; margin-bottom: 8px; }
.conflict-dialog p { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; }

/* Window select */
.window-select {
  display: flex; gap: 4px;
}
.window-btn {
  padding: 4px 12px; font-size: 12px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text-dim);
  cursor: pointer; font-family: var(--font);
}
.window-btn.active { border-color: var(--blue); color: var(--blue); }

/* Pagination */
.pagination {
  display: flex; align-items: center; gap: 12px;
  margin-top: 12px; font-size: 13px; color: var(--text-dim);
}

/* Modal overlay */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 100;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px;
  min-width: 400px; max-width: 500px; width: 90%;
}
.modal h3 { font-size: 16px; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* Form inputs */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
.form-input {
  width: 100%; padding: 8px 12px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-family: var(--mono); font-size: 13px;
}
.form-input:focus { outline: none; border-color: var(--blue); }
.form-hint { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* Danger button */
.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: rgba(245,85,93,0.1); }
.btn-archive { border-color: var(--orange); color: var(--orange); }
.btn-archive:hover { background: rgba(209,154,102,0.1); }
.btn-clone { border-color: var(--purple); color: var(--purple); }
.btn-clone:hover { background: rgba(198,120,221,0.1); }

/* Archived badge */
.status-archived { color: var(--text-dim); }
.status-archived::before { background: var(--text-dim); }

/* Archived card */
.card-archived { opacity: 0.6; border-style: dashed; }
.card-archived:hover { opacity: 0.85; }

/* Dashboard toolbar */
.dashboard-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
}
.toolbar-right { display: flex; align-items: center; gap: 12px; }

/* Checkbox toggle */
.toggle-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--text-dim); cursor: pointer;
}
.toggle-label input { cursor: pointer; }

/* Filter bar */
.filter-bar {
  display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px;
  margin-bottom: 16px;
}
.filter-field { display: flex; flex-direction: column; gap: 2px; }
.filter-field label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.filter-field input,
.filter-field select {
  padding: 6px 10px; background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-family: var(--mono); font-size: 12px;
}
.filter-field input:focus, .filter-field select:focus { outline: none; border-color: var(--blue); }

/* Subtab toggle */
.subtab-bar { display: flex; gap: 4px; margin-bottom: 16px; }
.subtab {
  padding: 6px 16px; font-size: 13px; font-family: var(--font);
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text-dim); cursor: pointer;
}
.subtab.active { border-color: var(--blue); color: var(--blue); }
.subtab .badge { display: inline-block; background: var(--yellow); color: var(--bg); font-size: 11px; padding: 1px 6px; border-radius: 10px; margin-left: 6px; font-weight: 600; }

/* Inline event detail */
.event-detail-row td { padding: 0 !important; border-bottom: 1px solid var(--border); }
.event-detail-content {
  padding: 16px 20px; background: var(--bg);
  border-top: 1px solid var(--border);
}
.event-detail-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}

/* Flow status badges */
.status-completed { color: var(--green); }
.status-completed::before { background: var(--green); }
.status-timed-out { color: var(--yellow); }
.status-timed-out::before { background: var(--yellow); }
.status-force-completed { color: var(--orange); }
.status-force-completed::before { background: var(--orange); }
.status-active { color: var(--blue); }
.status-active::before { background: var(--blue); }
.status-draft { color: var(--text-dim); }
.status-draft::before { background: var(--text-dim); }
.status-validated { color: var(--green); }
.status-validated::before { background: var(--green); }
.status-pending-review { color: var(--yellow); }
.status-pending-review::before { background: var(--yellow); }
.status-deactivated { color: var(--text-dim); }
.status-deactivated::before { background: var(--text-dim); }
.status-rejected { color: var(--red); }
.status-rejected::before { background: var(--red); }

/* Clickable rows */
.data-table tr.clickable { cursor: pointer; }
.data-table tr.clickable:hover td { background: rgba(97,175,239,0.05); }
</style>
</head>
<body>

<div class="header">
  <h1><span>Zero</span>Claw <span style="color:var(--text-dim);font-weight:400;font-size:13px;">Command Center</span></h1>
  <div class="header-right" id="health-status"></div>
</div>
<div class="main" id="app"></div>

<script>
'use strict';

// ── State ────────────────────────────────────────────────────────
const state = {
  view: 'dashboard',
  instance: null,
  instanceArchived: false,
  tab: 'overview',
  instances: [],
  refreshTimer: null,
  abortController: null,
  configEtag: null,
  routeGeneration: 0,
  showArchived: false,
  expandedEventId: null,
  flowSubTab: 'active',
};

// ── DOM helpers (XSS-safe) ───────────────────────────────────────
function h(tag, attrs) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'className') el.className = v;
      else if (k === 'textContent') el.textContent = v;
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else el.setAttribute(k, v);
    }
  }
  for (let i = 2; i < arguments.length; i++) {
    const child = arguments[i];
    if (child == null) continue;
    if (typeof child === 'string') el.appendChild(document.createTextNode(child));
    else if (child instanceof Node) el.appendChild(child);
  }
  return el;
}

function clear(el) { while (el.firstChild) el.removeChild(el.firstChild); }

function statusClass(s) {
  if (s === 'running') return 'status-running';
  if (s === 'stopped') return 'status-stopped';
  if (s === 'stale-pid') return 'status-stale-pid';
  if (s === 'dead') return 'status-dead';
  if (s === 'archived') return 'status-archived';
  if (s === 'completed') return 'status-completed';
  if (s === 'timed_out') return 'status-timed-out';
  if (s === 'force_completed') return 'status-force-completed';
  if (s === 'active') return 'status-active';
  if (s === 'draft') return 'status-draft';
  if (s === 'validated') return 'status-validated';
  if (s === 'pending_review') return 'status-pending-review';
  if (s === 'deactivated') return 'status-deactivated';
  if (s === 'rejected') return 'status-rejected';
  return 'status-unknown';
}

function fmtNum(n) {
  if (n == null) return '-';
  return n.toLocaleString();
}

function fmtDuration(ms) {
  if (ms == null) return '-';
  if (ms < 1000) return ms + 'ms';
  return (ms / 1000).toFixed(1) + 's';
}

function fmtTime(ts) {
  if (!ts) return '-';
  try {
    const d = new Date(ts);
    if (isNaN(d.getTime())) return ts;
    return d.toLocaleString();
  } catch (e) { return ts; }
}

// ── Notifications ────────────────────────────────────────────────
function showNotify(container, type, msg) {
  const existing = container.querySelector('.notify');
  if (existing) existing.remove();
  const n = h('div', { className: 'notify notify-' + type, textContent: msg });
  container.insertBefore(n, container.firstChild);
  if (type === 'success' || type === 'info') {
    setTimeout(function() { if (n.parentNode) n.remove(); }, 4000);
  }
}

// ── Modal helpers ────────────────────────────────────────────────
function showModal(contentEl) {
  closeModal();
  var overlay = h('div', { className: 'modal-overlay', id: 'modal-overlay' });
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal();
  });
  overlay.appendChild(contentEl);
  document.body.appendChild(overlay);
}

function closeModal() {
  var existing = document.getElementById('modal-overlay');
  if (existing) existing.remove();
}

function confirmDialog(title, message, confirmLabel, confirmClass, onConfirm) {
  var modal = h('div', { className: 'modal' },
    h('h3', { textContent: title }),
    h('p', { textContent: message, style: 'font-size:13px;color:var(--text-dim);margin-bottom:8px' }),
    h('div', { className: 'modal-actions' },
      h('button', { className: 'btn', textContent: 'Cancel', onClick: closeModal }),
      h('button', { className: 'btn ' + (confirmClass || 'btn-primary'), textContent: confirmLabel, onClick: function() {
        closeModal();
        onConfirm();
      }})
    )
  );
  showModal(modal);
}

function apiErrorMsg(res) {
  if (res.data && res.data.error) return res.data.error;
  return 'Request failed (HTTP ' + res.status + ')';
}

// ── API wrapper ──────────────────────────────────────────────────
async function api(path, opts) {
  opts = opts || {};
  const headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
  const resp = await fetch('/api' + path, {
    method: opts.method || 'GET',
    headers: headers,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
    signal: state.abortController ? state.abortController.signal : undefined,
  });
  const ct = resp.headers.get('content-type') || '';
  let data = null;
  if (ct.includes('application/json')) {
    data = await resp.json();
  }
  return { status: resp.status, data: data, headers: resp.headers };
}

// ── Router ───────────────────────────────────────────────────────
function route() {
  if (state.refreshTimer) { clearInterval(state.refreshTimer); state.refreshTimer = null; }
  if (state.abortController) { state.abortController.abort(); }
  state.abortController = new AbortController();
  state.routeGeneration++;
  const gen = state.routeGeneration;

  const hash = location.hash || '#/';
  // Split hash from query: #/instance/name?archived=1 -> parts + query
  var hashAndQuery = hash.replace('#/', '').split('?');
  const parts = hashAndQuery[0].split('/');
  var queryStr = hashAndQuery[1] || '';
  var queryArchived = queryStr.indexOf('archived=1') !== -1;

  if (parts[0] === 'instance' && parts[1]) {
    state.view = 'instance';
    state.instance = decodeURIComponent(parts[1]);
    state.instanceArchived = queryArchived;
    state.tab = parts[2] || 'overview';
    renderInstance(gen);
  } else {
    state.view = 'dashboard';
    state.instance = null;
    state.instanceArchived = false;
    state.tab = 'overview';
    renderDashboard(gen);
  }
}

window.addEventListener('hashchange', route);

// ── Dashboard ────────────────────────────────────────────────────
function instancesApiPath() {
  return '/instances' + (state.showArchived ? '?include_archived=true' : '');
}

async function renderDashboard(gen) {
  const app = document.getElementById('app');
  clear(app);
  app.appendChild(h('div', { className: 'loading', textContent: 'Loading instances...' }));

  try {
    const res = await api(instancesApiPath());
    if (gen !== state.routeGeneration) return;
    if (res.status === 200 && Array.isArray(res.data)) {
      state.instances = res.data;
      paintDashboard();
    } else {
      clear(app);
      var msg = (res.data && res.data.error) || ('Server returned ' + res.status);
      app.appendChild(h('div', { className: 'notify notify-error', textContent: 'Failed to load instances: ' + msg }));
    }
  } catch (e) {
    if (e.name === 'AbortError') return;
    clear(app);
    app.appendChild(h('div', { className: 'notify notify-error', textContent: 'Failed to load instances: ' + e.message }));
  }

  state.refreshTimer = setInterval(async function() {
    try {
      const res = await api(instancesApiPath());
      if (gen !== state.routeGeneration) return;
      if (res.status === 200 && Array.isArray(res.data)) {
        state.instances = res.data;
        paintDashboard();
      }
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }, 5000);
}

function paintDashboard() {
  const app = document.getElementById('app');
  clear(app);

  // Notification area
  app.appendChild(h('div', { id: 'dashboard-notify' }));

  // Toolbar
  var archiveCheckbox = h('input', { type: 'checkbox', id: 'show-archived-cb' });
  archiveCheckbox.checked = state.showArchived;
  archiveCheckbox.addEventListener('change', function() {
    state.showArchived = this.checked;
    route();
  });

  var toolbar = h('div', { className: 'dashboard-toolbar' },
    h('button', { className: 'btn btn-primary', textContent: '+ New Instance', onClick: showCreateDialog }),
    h('div', { className: 'toolbar-right' },
      h('label', { className: 'toggle-label' },
        archiveCheckbox,
        'Show archived'
      )
    )
  );
  app.appendChild(toolbar);

  var active = state.instances.filter(function(i) { return !i.archived_at; });
  var archived = state.instances.filter(function(i) { return !!i.archived_at; });

  if (active.length === 0 && archived.length === 0) {
    app.appendChild(h('div', { className: 'empty-state', textContent: 'No instances yet. Click "New Instance" to create one.' }));

    for (var inst of active) {

    for (var aInst of archived) {

    app.appendChild(archiveGrid);
  }
}

function makeActionBtn(label, cls, path, method) {
  var btn = h('button', { className: 'btn ' + cls, textContent: label });

    btn.textContent = label + '...';
    try {
      var res = await api(path, { method: method });
      if (res.status === 200) {
        btn.textContent = label;
        btn.disabled = false;
        route(); // refresh
      } else {
        btn.textContent = label;
        btn.disabled = false;
        var msg = (res.data && res.data.error) || 'Action failed';

        if (content) showNotify(content, 'error', msg);

      btn.textContent = label;
      btn.disabled = false;
      var content = document.getElementById('tab-content');
      if (content) showNotify(content, 'error', label + ' failed: ' + e.message);

// ── Config tab ───────────────────────────────────────────────────
// ── Structured Config Editor (Phase 18B) ─────────────────────────

var _cfgTouched = {};
var _cfgFormState = {};
var _cfgSecretPaths = [];
var _cfgFingerprints = {};
var _routeApiKeyChanged = {};
var _cfgMaskedData = null;

function markTouched(path) { _cfgTouched[path] = true; }
function clearTouched(path) { delete _cfgTouched[path]; }

function setNestedPath(obj, dottedPath, value) {
  var parts = dottedPath.split('.');
  var cur = obj;
  for (var i = 0; i < parts.length - 1; i++) {
    if (!cur[parts[i]] || typeof cur[parts[i]] !== 'object') cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = value;
}

function getNestedPath(obj, dottedPath) {
  var parts = dottedPath.split('.');
  var cur = obj;
  for (var i = 0; i < parts.length; i++) {
    if (cur == null) return undefined;
    cur = cur[parts[i]];
  }
  return cur;
}

function buildPatchFromTouched() {
  var patch = {};
  for (var path in _cfgTouched) {
    setNestedPath(patch, path, _cfgFormState[path]);
  }
  if (patch.model_routes) {
    patch.model_routes = buildModelRoutesForPatch();
  }
  return patch;
}

function buildModelRoutesForPatch() {
  var routes = _cfgFormState['model_routes'] || [];
  return routes.map(function(route, i) {
    var clean = { hint: route.hint, provider: route.provider, model: route.model };
    if (_routeApiKeyChanged[i]) {
      clean.api_key = route.api_key;
    }
    return clean;
  });
}

function cfgIsSecretPath(dottedPath) {
  if (_cfgSecretPaths.indexOf(dottedPath) !== -1) return true;
  if (/^model_routes\[\d+\]\.api_key$/.test(dottedPath)) {
    return _cfgSecretPaths.indexOf('model_routes[*].api_key') !== -1;
  }
  return false;
}

function patchContainsSecrets(patch) {
  for (var path in _cfgTouched) {
    if (cfgIsSecretPath(path)) return true;
  }
  if (patch.model_routes && Array.isArray(patch.model_routes)) {
    for (var i = 0; i < patch.model_routes.length; i++) {
      if (patch.model_routes[i].api_key !== undefined) return true;
    }
  }
  if (patch.gateway && patch.gateway.paired_tokens !== undefined) return true;
  return false;
}

    }
    state.configEtag = res.data.etag;
    _cfgTouched = {};
    _cfgSecretPaths = res.data.secret_paths || [];
    _cfgFingerprints = res.data.secret_fingerprints || {};
    _cfgMaskedData = res.data.config_masked || {};
    _routeApiKeyChanged = {};
    _cfgFormState = JSON.parse(JSON.stringify(_cfgMaskedData));
    paintConfig(res.data);
  } catch (e) {
    if (e.name === 'AbortError') return;
    clear(content);
    content.appendChild(h('div', { className: 'notify notify-error', textContent: 'Error: ' + e.message }));
  }
}

// ── Section builder ──────────────────────────────────────────────

function buildSection(title, expanded, contentFn) {
  var body = h('div', { style: expanded ? 'padding:12px' : 'padding:12px;display:none' });
  contentFn(body);
  var arrow = h('span', { textContent: expanded ? '\u25BC' : '\u25B6', style: 'margin-right:8px;font-size:11px' });
  var hdr = h('div', {
    style: 'padding:10px 12px;cursor:pointer;display:flex;align-items:center;border-bottom:1px solid var(--border);user-select:none',
    onClick: function() {
      var shown = body.style.display !== 'none';
      body.style.display = shown ? 'none' : '';
      arrow.textContent = shown ? '\u25B6' : '\u25BC';
    }
  }, arrow, h('span', { style: 'font-weight:600;color:var(--text)', textContent: title }));
  return h('div', { className: 'panel', style: 'margin-bottom:8px' }, hdr, body);
}

// ── Field builders ───────────────────────────────────────────────

function buildTextInput(path, label, value) {
  var input = h('input', { className: 'form-input', type: 'text', value: value || '' });
  input.addEventListener('input', function() {
    _cfgFormState[path] = this.value;
    markTouched(path);
  });
  return h('div', { className: 'form-group' },
    h('label', { className: 'form-label', textContent: label }),
    input
  );
}

function buildNumberInput(path, label, value, min, max, step) {
  var input = h('input', { className: 'form-input', type: 'number', value: value != null ? value : '' });
  if (min != null) input.setAttribute('min', min);
  if (max != null) input.setAttribute('max', max);
  if (step != null) input.setAttribute('step', step);
  input.addEventListener('input', function() {
    var v = step && step < 1 ? parseFloat(this.value) : parseInt(this.value, 10);
    if (!isNaN(v)) { _cfgFormState[path] = v; markTouched(path); }
  });
  return h('div', { className: 'form-group' },
    h('label', { className: 'form-label', textContent: label }),
    input
  );
}

function buildCheckbox(path, label, checked) {
  var input = h('input', { type: 'checkbox' });
  input.checked = !!checked;
  input.addEventListener('change', function() {
    _cfgFormState[path] = this.checked;
    markTouched(path);
  });
  return h('div', { className: 'form-group', style: 'display:flex;align-items:center;gap:8px' },
    input,
    h('label', { style: 'color:var(--text);cursor:pointer', textContent: label })
  );
}

function buildSelect(path, label, value, options) {
  var sel = h('select', { className: 'form-input' });
  for (var i = 0; i < options.length; i++) {
    var opt = h('option', { value: options[i], textContent: options[i] });
    if (options[i] === value) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.addEventListener('change', function() {
    _cfgFormState[path] = this.value;
    markTouched(path);
    // Conditional visibility toggles
    if (path === 'observability.backend') {
      var otel = document.getElementById('otel-fields');
      if (otel) otel.style.display = this.value === 'otel' ? '' : 'none';
    }
    if (path === 'runtime.kind') {
      var dk = document.getElementById('docker-fields');
      if (dk) dk.style.display = this.value === 'docker' ? '' : 'none';
    }
    if (path === 'tunnel.provider') {
      ['cloudflare','tailscale','ngrok','custom'].forEach(function(p) {
        var el = document.getElementById('tunnel-' + p);
        if (el) el.style.display = p === sel.value ? '' : 'none';
      });
    }
  });
  return h('div', { className: 'form-group' },
    h('label', { className: 'form-label', textContent: label }),
    sel
  );
}

function buildListInput(path, label, items) {
  var container = h('div', { className: 'form-group' });
  container.appendChild(h('label', { className: 'form-label', textContent: label }));
  var listDiv = h('div');
  var currentItems = items ? items.slice() : [];

  function renderList() {
    clear(listDiv);
    for (var i = 0; i < currentItems.length; i++) {
      (function(idx) {
        var row = h('div', { style: 'display:flex;gap:4px;margin-bottom:4px' },
          h('input', { className: 'form-input', type: 'text', value: currentItems[idx], style: 'flex:1' }),
          h('button', { className: 'btn', textContent: '\u00D7', style: 'padding:4px 8px', onClick: function() {
            currentItems.splice(idx, 1);
            _cfgFormState[path] = currentItems.slice();
            markTouched(path);
            renderList();
          }})
        );
        row.querySelector('input').addEventListener('input', function() {
          currentItems[idx] = this.value;
          _cfgFormState[path] = currentItems.slice();
          markTouched(path);
        });
        listDiv.appendChild(row);
      })(i);
    }
    var addBtn = h('button', { className: 'btn', textContent: '+ Add', style: 'margin-top:4px;font-size:12px', onClick: function() {
      currentItems.push('');
      _cfgFormState[path] = currentItems.slice();
      markTouched(path);
      renderList();
    }});
    listDiv.appendChild(addBtn);
  }
  renderList();
  container.appendChild(listDiv);
  return container;
}

// ── Secret field component ───────────────────────────────────────

function buildSecretField(path, label) {
  var container = h('div', { className: 'form-group' });
  container.appendChild(h('label', { className: 'form-label', textContent: label }));

  var fp = _cfgFingerprints[path];
  var hasValue = !!fp;
  var display = h('div', { style: 'display:flex;align-items:center;gap:8px' });
  var statusText = h('span', { style: 'color:var(--text-dim);font-family:var(--mono);font-size:13px' });
  statusText.textContent = hasValue ? 'Configured (' + fp + ')' : 'Not set';

  var inputArea = h('div', { style: 'display:none' });
  var secretInput = h('input', { className: 'form-input', type: 'password', placeholder: 'Enter new value' });

  var confirmBtn = h('button', { className: 'btn', textContent: 'Confirm', style: 'font-size:12px', onClick: function() {
    var val = secretInput.value;
    if (!val) return;
    _cfgFormState[path] = val;
    markTouched(path);
    inputArea.style.display = 'none';
    display.style.display = 'flex';
    statusText.textContent = 'New value pending save';
    statusText.style.color = 'var(--yellow)';
  }});

  var cancelBtn = h('button', { className: 'btn', textContent: 'Cancel', style: 'font-size:12px', onClick: function() {
    clearTouched(path);
    inputArea.style.display = 'none';
    display.style.display = 'flex';
    statusText.textContent = hasValue ? 'Configured (' + fp + ')' : 'Not set';
    statusText.style.color = 'var(--text-dim)';
    secretInput.value = '';
  }});

  inputArea.appendChild(h('div', { style: 'display:flex;gap:4px' }, secretInput, confirmBtn, cancelBtn));

  var changeBtn = h('button', { className: 'btn', textContent: hasValue ? 'Change' : 'Set', style: 'font-size:12px', onClick: function() {
    display.style.display = 'none';
    inputArea.style.display = '';
    secretInput.focus();
  }});

  display.appendChild(statusText);
  display.appendChild(changeBtn);
  container.appendChild(display);
  container.appendChild(inputArea);
  return container;
}

// ── Channel block (enable/disable + fields) ──────────────────────

function buildChannelBlock(channelKey, label, channelsConfig, fields) {
  var enabled = channelsConfig && channelsConfig[channelKey] != null;
  var channelData = (channelsConfig && channelsConfig[channelKey]) || {};
  var basePath = 'channels_config.' + channelKey;

  var container = h('div', { style: 'border:1px solid var(--border);border-radius:var(--radius);padding:8px;margin-bottom:8px' });
  var headerDiv = h('div', { style: 'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px' });
  headerDiv.appendChild(h('span', { style: 'font-weight:600;color:var(--text)', textContent: label }));

  var fieldsDiv = h('div', { style: enabled ? '' : 'display:none' });

  if (enabled) {
    for (var i = 0; i < fields.length; i++) {
      var f = fields[i];
      var fPath = basePath + '.' + f.path;
      if (f.type === 'text') fieldsDiv.appendChild(buildTextInput(fPath, f.label, channelData[f.path] || ''));
      else if (f.type === 'num') fieldsDiv.appendChild(buildNumberInput(fPath, f.label, channelData[f.path], 0, 65535, 1));
      else if (f.type === 'check') fieldsDiv.appendChild(buildCheckbox(fPath, f.label, channelData[f.path]));
      else if (f.type === 'secret') fieldsDiv.appendChild(buildSecretField(fPath, f.label));
      else if (f.type === 'list') fieldsDiv.appendChild(buildListInput(fPath, f.label, channelData[f.path] || []));
    }
  }

  var toggleBtn = h('button', {
    className: 'btn',
    textContent: enabled ? 'Disable' : 'Enable',
    style: 'font-size:12px',
    onClick: function() {
      if (enabled) {
        _cfgFormState[basePath] = null;
        markTouched(basePath);
        fieldsDiv.style.display = 'none';
        toggleBtn.textContent = 'Enable';
        enabled = false;
      } else {
        clearTouched(basePath);
        fieldsDiv.style.display = '';
        toggleBtn.textContent = 'Disable';
        enabled = true;
      }
    }
  });
  headerDiv.appendChild(toggleBtn);
  container.appendChild(headerDiv);
  container.appendChild(fieldsDiv);
  return container;
}

// ── Paired tokens display ────────────────────────────────────────

function buildPairedTokensDisplay(gw) {
  var count = gw && gw.paired_tokens ? gw.paired_tokens.length : 0;
  var container = h('div', { className: 'form-group' });
  container.appendChild(h('label', { className: 'form-label', textContent: 'Paired Tokens' }));
  var info = h('div', { style: 'display:flex;align-items:center;gap:8px' });
  info.appendChild(h('span', { style: 'color:var(--text-dim);font-family:var(--mono);font-size:13px', textContent: count + ' token(s) configured' }));

  var addBtn = h('button', { className: 'btn', textContent: 'Add Token', style: 'font-size:12px', onClick: function() {
    var ta = h('textarea', { className: 'form-input', placeholder: 'Enter tokens, one per line.\nThis REPLACES all existing tokens.', style: 'height:80px;margin-top:8px' });
    var confirmAdd = h('button', { className: 'btn btn-primary', textContent: 'Replace All', style: 'font-size:12px;margin-top:4px', onClick: function() {
      var lines = ta.value.split('\n').map(function(l) { return l.trim(); }).filter(function(l) { return l.length > 0; });
      _cfgFormState['gateway.paired_tokens'] = lines;
      markTouched('gateway.paired_tokens');
      showNotify(document.getElementById('config-notify'), 'info', 'Paired tokens staged for save');
      container.removeChild(ta);
      container.removeChild(confirmAdd);
    }});
    container.appendChild(ta);
    container.appendChild(confirmAdd);
  }});
  info.appendChild(addBtn);

  var clearBtn = h('button', { className: 'btn', textContent: 'Clear All', style: 'font-size:12px;color:var(--red)', onClick: function() {
    if (!confirm('Remove all paired tokens? Existing clients will need to re-pair.')) return;
    _cfgFormState['gateway.paired_tokens'] = [];
    markTouched('gateway.paired_tokens');
    showNotify(document.getElementById('config-notify'), 'info', 'Paired tokens will be cleared on save');
  }});
  if (count > 0) info.appendChild(clearBtn);

  container.appendChild(info);
  return container;
}

// ── Model routes editor ──────────────────────────────────────────

function buildModelRoutesEditor(routes) {
  var container = h('div');
  var currentRoutes = routes.map(function(r) { return { hint: r.hint, provider: r.provider, model: r.model, api_key: r.api_key || '' }; });
  _cfgFormState['model_routes'] = currentRoutes;

  function renderRoutes() {
    clear(container);
    for (var i = 0; i < currentRoutes.length; i++) {
      (function(idx) {
        var route = currentRoutes[idx];
        var row = h('div', { style: 'border:1px solid var(--border);border-radius:var(--radius);padding:8px;margin-bottom:8px' });
        row.appendChild(h('div', { style: 'display:flex;gap:8px;margin-bottom:4px' },
          buildMiniInput('Hint', route.hint, function(v) { route.hint = v; markTouched('model_routes'); }),
          buildMiniInput('Provider', route.provider, function(v) { route.provider = v; markTouched('model_routes'); }),
          buildMiniInput('Model', route.model, function(v) { route.model = v; markTouched('model_routes'); })
        ));

        var fp = _cfgFingerprints['model_routes[' + idx + '].api_key'];
        var keyStatus = h('span', { style: 'color:var(--text-dim);font-size:12px', textContent: fp ? 'API Key: ' + fp : 'No API key' });
        var keyChangeBtn = h('button', { className: 'btn', textContent: fp ? 'Change Key' : 'Set Key', style: 'font-size:11px', onClick: function() {
          var inp = h('input', { className: 'form-input', type: 'password', placeholder: 'New API key', style: 'font-size:12px' });
          var confirmK = h('button', { className: 'btn', textContent: 'OK', style: 'font-size:11px', onClick: function() {
            route.api_key = inp.value;
            _routeApiKeyChanged[idx] = true;
            markTouched('model_routes');
            keyStatus.textContent = 'New key pending save';
            keyStatus.style.color = 'var(--yellow)';
            inp.remove(); confirmK.remove();
          }});
          row.appendChild(h('div', { style: 'display:flex;gap:4px;margin-top:4px' }, inp, confirmK));
        }});
        var removeBtn = h('button', { className: 'btn', textContent: 'Remove', style: 'font-size:11px;color:var(--red)', onClick: function() {
          currentRoutes.splice(idx, 1);
          markTouched('model_routes');
          renderRoutes();
        }});
        row.appendChild(h('div', { style: 'display:flex;align-items:center;gap:8px;margin-top:4px' }, keyStatus, keyChangeBtn, removeBtn));
        container.appendChild(row);
      })(i);
    }
    container.appendChild(h('button', { className: 'btn', textContent: '+ Add Route', style: 'font-size:12px', onClick: function() {
      currentRoutes.push({ hint: '', provider: '', model: '', api_key: '' });
      markTouched('model_routes');
      renderRoutes();
    }}));
  }
  renderRoutes();
  return container;
}

function buildMiniInput(placeholder, value, onChange) {
  var inp = h('input', { className: 'form-input', type: 'text', placeholder: placeholder, value: value || '', style: 'font-size:12px;flex:1' });
  inp.addEventListener('input', function() { onChange(this.value); });
  return inp;
}

// ── Save via PATCH ───────────────────────────────────────────────

async function doConfigPatch() {
  var notify = document.getElementById('config-notify');
  var conflictArea = document.getElementById('conflict-area');
  var patch = buildPatchFromTouched();

  if (Object.keys(patch).length === 0) {
    showNotify(notify, 'info', 'No changes to save');
    return;
  }

  var needsSecretHeader = patchContainsSecrets(patch);
  if (needsSecretHeader) {
    var secretList = [];
    for (var p in _cfgTouched) { if (cfgIsSecretPath(p)) secretList.push(p); }
    if (patch.model_routes) {
      for (var i = 0; i < patch.model_routes.length; i++) {
        if (patch.model_routes[i].api_key !== undefined) secretList.push('model_routes[' + i + '].api_key');
      }
    }
    if (patch.gateway && patch.gateway.paired_tokens !== undefined) secretList.push('gateway.paired_tokens');
    if (!confirm('You are about to write new values to:\n' + secretList.join('\n') + '\n\nContinue?')) return;
  }

  var btn = document.getElementById('btn-save');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }

  try {
    var headers = {};
    if (needsSecretHeader) headers['X-Allow-Secret-Write'] = 'true';

    var res = await api('/instances/' + encodeURIComponent(state.instance) + '/config', {
      method: 'PATCH',
      headers: headers,
      body: { patch: patch, etag: state.configEtag }
    });

    if (btn) { btn.disabled = false; btn.textContent = 'Save Changes'; }

    if (res.status === 200) {
      state.configEtag = res.data.etag;
      showNotify(notify, 'success', 'Config saved successfully');
      if (conflictArea) clear(conflictArea);
      if (res.data.restart_recommended) {
        showNotify(notify, 'warn', 'Instance is running - restart recommended for changes to take effect');
      }
      // Re-fetch to update form state
      renderConfig(state.routeGeneration);
    } else if (res.status === 409) {
      if (conflictArea) {
        clear(conflictArea);
        conflictArea.appendChild(h('div', { className: 'conflict-dialog' },
          h('h3', { textContent: 'Conflict Detected' }),
          h('p', { textContent: 'Config was modified elsewhere. Please refresh.' }),
          h('button', { className: 'btn btn-primary', textContent: 'Reload Config', onClick: function() { renderConfig(state.routeGeneration); }})
        ));
      }
    } else if (res.status === 400) {
      var msg = (res.data && res.data.error) || 'Invalid patch';
      showNotify(notify, 'error', msg);
      if (res.data && res.data.blocked_fields) {
        showNotify(notify, 'error', msg + ' - Blocked: ' + res.data.blocked_fields.join(', '));
      }
      if (res.data && res.data.invalid_paths) {
        showNotify(notify, 'error', msg + ' - Invalid paths: ' + res.data.invalid_paths.join(', '));
      }
    } else {
      showNotify(notify, 'error', (res.data && res.data.error) || 'Save failed');
    }
  } catch (e) {
    if (e.name === 'AbortError') return;
    if (btn) { btn.disabled = false; btn.textContent = 'Save Changes'; }
    showNotify(notify, 'error', 'Save error: ' + e.message);
  }
}

// ── Events tab ───────────────────────────────────────────────────
async function renderEvents(gen) {
  var content = document.getElementById('tab-content');
  clear(content);
  content.appendChild(h('div', { className: 'loading', textContent: 'Loading events...' }));

  var offset = 0;
  var limit = 20;

  async function load() {
    try {
      var res = await api('/instances/' + encodeURIComponent(state.instance) + '/tasks?limit=' + limit + '&offset=' + offset);
      if (gen !== state.routeGeneration) return;
      if (res.status !== 200) {
        clear(content);
        content.appendChild(h('div', { className: 'notify notify-error', textContent: (res.data && res.data.error) || 'Failed to load events' }));
        return;
      }
      paintEvents(res.data, gen);
    } catch (e) {
      if (e.name === 'AbortError') return;
      clear(content);
      content.appendChild(h('div', { className: 'notify notify-error', textContent: 'Error: ' + e.message }));
    }
  }

  function paintEvents(data) {
    clear(content);
    var panel = h('div', { className: 'panel' });
    panel.appendChild(h('div', { className: 'panel-title', textContent: 'Events', style: 'margin-bottom:12px' }));

    var tasks = data.tasks || [];
    if (tasks.length === 0) {
      panel.appendChild(h('div', { className: 'empty-state', textContent: data.message || 'No events recorded yet.' }));
      content.appendChild(panel);
      return;
    }

    var table = h('table', { className: 'data-table' });
    var thead = h('thead', null,
      h('tr', null,
        h('th', { textContent: 'Time' }),
        h('th', { textContent: 'Type' }),
        h('th', { textContent: 'Channel' }),
        h('th', { textContent: 'Summary' }),
        h('th', { textContent: 'Status' }),
        h('th', { textContent: 'Duration' })
      )
    );
    table.appendChild(thead);

    var tbody = h('tbody');
    for (var t of tasks) {
      var row = h('tr', null,
        h('td', { textContent: fmtTime(t.created_at) }),
        h('td', { textContent: t.event_type || '-' }),
        h('td', { textContent: t.channel || '-' }),
        h('td', { textContent: t.summary || '-' }),
        h('td', null, h('span', { className: 'status ' + statusClass(t.status === 'completed' ? 'running' : t.status === 'failed' ? 'dead' : 'unknown'), textContent: t.status || '-' })),
        h('td', { textContent: fmtDuration(t.duration_ms) })
      );
      tbody.appendChild(row);
    }
    table.appendChild(tbody);
    panel.appendChild(table);

    // Pagination
    var total = data.total || 0;
    var pag = h('div', { className: 'pagination' },
      h('span', { textContent: 'Showing ' + (offset + 1) + '-' + (offset + tasks.length) + ' of ' + total })
    );
    if (offset > 0) {
      pag.appendChild(h('button', { className: 'btn', textContent: 'Previous', onClick: function() { offset = Math.max(0, offset - limit); load(); } }));
    }
    if (offset + limit < total) {
      pag.appendChild(h('button', { className: 'btn', textContent: 'Next', onClick: function() { offset += limit; load(); } }));
    }
    panel.appendChild(pag);
    content.appendChild(panel);
  }

  await load();
}

// ── Telegram tab ─────────────────────────────────────────────────
async function renderTelegram(gen) {
  var content = document.getElementById('tab-content');
  clear(content);

  // Health section
  var healthPanel = h('div', { className: 'panel', style: 'margin-bottom:20px' });
  var healthHeader = h('div', { className: 'panel-header' },
    h('div', { className: 'panel-title', textContent: 'Telegram Health' })
  );
  healthPanel.appendChild(healthHeader);

  var currentHealthWindow = '5m';

  function buildWindowSelector(parent) {
    var existing = parent.querySelector('.window-select');
    if (existing) existing.remove();
    var selector = h('div', { className: 'window-select', style: 'margin-bottom:12px' });
    var windows = ['1m', '5m', '15m', '1h'];
    for (var i = 0; i < windows.length; i++) {
      (function(w) {
        selector.appendChild(h('button', {
          className: 'window-btn' + (w === currentHealthWindow ? ' active' : ''),
          textContent: w,
          onClick: function() { currentHealthWindow = w; loadHealth(); }
        }));
      })(windows[i]);
    }
    parent.insertBefore(selector, healthHeader.nextSibling);
  }

  var healthGrid = h('div', { className: 'usage-grid', id: 'tg-health-grid' });
  healthPanel.appendChild(healthGrid);
  content.appendChild(healthPanel);

  async function loadHealth() {
    buildWindowSelector(healthPanel);
    var grid = document.getElementById('tg-health-grid');
    if (!grid) return;
    clear(grid);
    grid.appendChild(h('div', { className: 'loading', textContent: 'Loading health...' }));
    try {
      var res = await api('/instances/' + encodeURIComponent(state.instance) + '/telegram/health?window=' + currentHealthWindow);
      if (gen !== state.routeGeneration) return;
      if (res.status !== 200) {
        clear(grid);
        grid.appendChild(h('div', { className: 'notify notify-error', textContent: apiErrorMsg(res) }));
        return;
      }
      paintHealth(res.data, grid);
    } catch (e) {
      if (e.name === 'AbortError') return;
      clear(grid);
      grid.appendChild(h('div', { className: 'notify notify-error', textContent: 'Error: ' + e.message }));
    }
  }

  function paintHealth(data, grid) {
    clear(grid);
    var c = data.counters || {};
    var stats = [
      { label: 'Events/min', value: c.events_per_min != null ? c.events_per_min.toFixed(1) : '0' },
      { label: 'Inbound', value: fmtNum(c.inbound_count) },
      { label: 'Outbound', value: fmtNum(c.outbound_count) },
      { label: 'Auth Rejects', value: fmtNum(c.auth_reject_count) },
      { label: 'Guard Rejects', value: fmtNum(c.guard_reject_count) },
      { label: 'Callback Reject %', value: c.callback_reject_rate != null ? c.callback_reject_rate.toFixed(1) + '%' : '-' },
      { label: 'STT Error %', value: c.stt_error_rate != null ? c.stt_error_rate.toFixed(1) + '%' : '-' },
      { label: 'STT P95 Latency', value: fmtDuration(c.stt_p95_latency_ms) },
    ];
    for (var s of stats) {
      grid.appendChild(h('div', { className: 'usage-stat' },
        h('div', { className: 'usage-stat-label', textContent: s.label }),
        h('div', { className: 'usage-stat-value', textContent: s.value })
      ));
    }
  }

  // Health auto-refresh: 15s
  await loadHealth();
  state.refreshTimer = setInterval(function() {
    if (gen !== state.routeGeneration) return;
    loadHealth();
  }, 15000);

  // Events section
  var eventsPanel = h('div', { className: 'panel' });
  var eventsHeader = h('div', { className: 'panel-header' },
    h('div', { className: 'panel-title', textContent: 'Telegram Events' }),
    h('button', { className: 'btn', textContent: 'Refresh', onClick: function() { loadTelegramEvents(); } })
  );
  eventsPanel.appendChild(eventsHeader);

  // Filter bar
  var filterEventType = '';
  var filterStatus = '';
  var filterChatId = '';
  var filterAfter = '';
  var filterBefore = '';
  var evtOffset = 0;
  var evtLimit = 20;

  function buildEventsFilter() {
    var bar = h('div', { className: 'filter-bar' });
    var fType = h('div', { className: 'filter-field' },
      h('label', { textContent: 'Event Type' }),
      h('input', { type: 'text', value: filterEventType, placeholder: 'e.g. tg.inbound.message', onInput: function(e) { filterEventType = e.target.value; } })
    );
    var fStatus = h('div', { className: 'filter-field' },
      h('label', { textContent: 'Status' }),
      h('input', { type: 'text', value: filterStatus, placeholder: 'e.g. completed', onInput: function(e) { filterStatus = e.target.value; } })
    );
    var fChat = h('div', { className: 'filter-field' },
      h('label', { textContent: 'Chat ID' }),
      h('input', { type: 'text', value: filterChatId, placeholder: 'Chat ID', onInput: function(e) { filterChatId = e.target.value; } })
    );
    var fAfter = h('div', { className: 'filter-field' },
      h('label', { textContent: 'After' }),
      h('input', { type: 'datetime-local', value: filterAfter, onInput: function(e) { filterAfter = e.target.value; } })
    );
    var fBefore = h('div', { className: 'filter-field' },
      h('label', { textContent: 'Before' }),
      h('input', { type: 'datetime-local', value: filterBefore, onInput: function(e) { filterBefore = e.target.value; } })
    );
    bar.appendChild(fType);
    bar.appendChild(fStatus);
    bar.appendChild(fChat);
    bar.appendChild(fAfter);
    bar.appendChild(fBefore);
    bar.appendChild(h('button', { className: 'btn btn-primary', textContent: 'Apply', onClick: function() { evtOffset = 0; loadTelegramEvents(); } }));
    bar.appendChild(h('button', { className: 'btn', textContent: 'Clear', onClick: function() {
      filterEventType = ''; filterStatus = ''; filterChatId = ''; filterAfter = ''; filterBefore = '';
      evtOffset = 0; loadTelegramEvents();
    }}));
    return bar;
  }

  eventsPanel.appendChild(buildEventsFilter());
  var eventsBody = h('div', { id: 'tg-events-body' });
  eventsPanel.appendChild(eventsBody);
  content.appendChild(eventsPanel);

  async function loadTelegramEvents() {
    var body = document.getElementById('tg-events-body');
    if (!body) return;
    clear(body);
    body.appendChild(h('div', { className: 'loading', textContent: 'Loading events...' }));
    state.expandedEventId = null;

    var params = 'limit=' + evtLimit + '&offset=' + evtOffset;
    if (filterEventType) params += '&event_type=' + encodeURIComponent(filterEventType);
    if (filterStatus) params += '&status=' + encodeURIComponent(filterStatus);
    if (filterChatId) params += '&chat_id=' + encodeURIComponent(filterChatId);
    if (filterAfter) params += '&after=' + encodeURIComponent(filterAfter);
    if (filterBefore) params += '&before=' + encodeURIComponent(filterBefore);

    try {
      var res = await api('/instances/' + encodeURIComponent(state.instance) + '/telegram/events?' + params);
      if (gen !== state.routeGeneration) return;
      if (res.status !== 200) {
        clear(body);
        body.appendChild(h('div', { className: 'notify notify-error', textContent: apiErrorMsg(res) }));
        return;
      }
      paintTelegramEvents(res.data, body);
    } catch (e) {
      if (e.name === 'AbortError') return;
      clear(body);
      body.appendChild(h('div', { className: 'notify notify-error', textContent: 'Error: ' + e.message }));
    }
  }

  function deriveDirection(eventType) {
    if (!eventType) return '-';
    if (eventType.indexOf('tg.inbound') === 0) return 'In';
    if (eventType.indexOf('tg.outbound') === 0) return 'Out';
    return '-';
  }

  function truncate(s, len) {
    if (!s) return '-';
    if (s.length <= len) return s;
    return s.substring(0, len) + '...';
  }

  function paintTelegramEvents(data, body) {
    clear(body);
    var events = data.events || [];
    if (events.length === 0) {
      body.appendChild(h('div', { className: 'empty-state', textContent: 'No telegram events found.' }));
      return;
    }

    var table = h('table', { className: 'data-table' });
    var thead = h('thead', null,
      h('tr', null,
        h('th', { textContent: 'Time' }),
        h('th', { textContent: 'Type' }),
        h('th', { textContent: 'Direction' }),
        h('th', { textContent: 'Chat ID' }),
        h('th', { textContent: 'Status' }),
        h('th', { textContent: 'Duration' }),
        h('th', { textContent: 'Corr. ID' })
      )
    );
    table.appendChild(thead);

    var tbody = h('tbody');
    for (var i = 0; i < events.length; i++) {
      (function(evt) {
        var chatDisplay = truncate(evt.channel || evt.chat_id || '', 12);
        var chatFull = evt.channel || evt.chat_id || '-';
        var row = h('tr', { className: 'clickable' },
          h('td', { textContent: fmtTime(evt.created_at) }),
          h('td', { textContent: evt.event_type || '-' }),
          h('td', { textContent: deriveDirection(evt.event_type) }),
          h('td', { textContent: chatDisplay, title: chatFull }),
          h('td', null, h('span', { className: 'status ' + statusClass(evt.status || 'unknown'), textContent: evt.status || '-' })),
          h('td', { textContent: fmtDuration(evt.duration_ms) }),
          h('td', { textContent: truncate(evt.correlation_id, 12), title: evt.correlation_id || '' })
        );
        row.addEventListener('click', function() {
          expandTelegramEvent(evt.id, row, gen);
        });
        tbody.appendChild(row);
      })(events[i]);
    }
    table.appendChild(tbody);
    body.appendChild(table);

    // Pagination
    var total = data.total || 0;
    if (total > 0) {
      var pag = h('div', { className: 'pagination' },
        h('span', { textContent: 'Showing ' + (evtOffset + 1) + '-' + Math.min(evtOffset + events.length, total) + ' of ' + total })
      );
      if (evtOffset > 0) {
        pag.appendChild(h('button', { className: 'btn', textContent: 'Previous', onClick: function() { evtOffset = Math.max(0, evtOffset - evtLimit); loadTelegramEvents(); } }));
      }
      if (evtOffset + evtLimit < total) {
        pag.appendChild(h('button', { className: 'btn', textContent: 'Next', onClick: function() { evtOffset += evtLimit; loadTelegramEvents(); } }));
      }
      body.appendChild(pag);
    }
  }

  async function expandTelegramEvent(eventId, row, gen) {
    // Collapse if already expanded
    if (state.expandedEventId === eventId) {
      var existing = row.nextElementSibling;
      if (existing && existing.classList.contains('event-detail-row')) existing.remove();
      state.expandedEventId = null;
      return;
    }
    // Collapse any previous expansion
    var prev = row.parentNode.querySelector('.event-detail-row');
    if (prev) prev.remove();
    state.expandedEventId = eventId;

    // Create placeholder row
    var detailRow = h('tr', { className: 'event-detail-row' });
    var detailTd = h('td', { colSpan: '7' });
    var detailContent = h('div', { className: 'event-detail-content' });

      });

  }

  await loadTelegramEvents();

// ── Flows tab ────────────────────────────────────────────────────
var _pendingBadgeCount = 0;
async function renderFlows(gen) {
  var content = document.getElementById('tab-content');
  clear(content);

  // Subtab toggle
  var subtabBar = h('div', { className: 'subtab-bar' });
  function buildSubtabs() {
    clear(subtabBar);
    subtabBar.appendChild(h('button', {
      className: 'subtab' + (state.flowSubTab === 'active' ? ' active' : ''),
      textContent: 'Active',
      onClick: function() { state.flowSubTab = 'active'; renderFlows(gen); }
    }));
    subtabBar.appendChild(h('button', {
      className: 'subtab' + (state.flowSubTab === 'history' ? ' active' : ''),
      textContent: 'History',
      onClick: function() { state.flowSubTab = 'history'; renderFlows(gen); }
    }));
    var reviewBtn = h('button', {
      className: 'subtab' + (state.flowSubTab === 'review' ? ' active' : ''),
      onClick: function() { state.flowSubTab = 'review'; renderFlows(gen); }
    });
    reviewBtn.appendChild(document.createTextNode('Review Queue'));
    if (_pendingBadgeCount > 0) {
      reviewBtn.appendChild(h('span', { className: 'badge', textContent: String(_pendingBadgeCount) }));
    }
    subtabBar.appendChild(reviewBtn);
    subtabBar.appendChild(h('button', {
      className: 'subtab' + (state.flowSubTab === 'versions' ? ' active' : ''),
      textContent: 'Versions',
      onClick: function() { state.flowSubTab = 'versions'; renderFlows(gen); }
    }));
    subtabBar.appendChild(h('button', {
      className: 'subtab' + (state.flowSubTab === 'audit' ? ' active' : ''),
      textContent: 'Audit Log',
      onClick: function() { state.flowSubTab = 'audit'; renderFlows(gen); }
    }));
  }
  buildSubtabs();
  content.appendChild(subtabBar);

  // Fetch pending count for badge (non-blocking)
  if (state.instance) {
    api('/instances/' + encodeURIComponent(state.instance) + '/flows/versions/pending').then(function(res) {
      if (gen !== state.routeGeneration) return;
      var count = (res.status === 200 && res.data && res.data.total) ? res.data.total : 0;
      if (count !== _pendingBadgeCount) {
        _pendingBadgeCount = count;
        buildSubtabs();
      }
    }).catch(function() {});
  }

  var body = h('div', { id: 'flows-body' });
  content.appendChild(body);

  if (state.flowSubTab === 'active') {
    await renderActiveFlows(gen, body);
  } else if (state.flowSubTab === 'history') {
    await renderFlowHistory(gen, body);
  } else if (state.flowSubTab === 'review') {
    await renderReviewQueue(gen, body);
  } else if (state.flowSubTab === 'versions') {
    await renderFlowVersions(gen, body);
  } else if (state.flowSubTab === 'audit') {
    await renderFlowAudit(gen, body);
  }
}

async function renderActiveFlows(gen, container) {
  clear(container);
  container.appendChild(h('div', { className: 'loading', textContent: 'Loading active flows...' }));

  async function loadActive() {
    try {
      var res = await api('/instances/' + encodeURIComponent(state.instance) + '/flows/active');
      if (gen !== state.routeGeneration) return;
      if (res.status !== 200) {
        clear(container);
        container.appendChild(h('div', { className: 'notify notify-error', textContent: apiErrorMsg(res) }));
        return;
      }
      paintActiveFlows(res.data);

      if (e.name === 'AbortError') return;
      clear(container);
      container.appendChild(h('div', { className: 'notify notify-error', textContent: 'Error: ' + e.message }));
    }
  }

  function paintActiveFlows(data) {
    clear(container);
    var panel = h('div', { className: 'panel' });
    panel.appendChild(h('div', { className: 'panel-title', textContent: 'Active Flows', style: 'margin-bottom:12px' }));
