    if (flows.length === 0) {
      panel.appendChild(h('div', { className: 'empty-state', textContent: 'No active flows.' }));
      container.appendChild(panel);
      return;
    }

    var table = h('table', { className: 'data-table' });
    var thead = h('thead', null,
      h('tr', null,
        h('th', { textContent: 'Chat ID' }),
        h('th', { textContent: 'Flow Name' }),
        h('th', { textContent: 'Current Step' }),
        h('th', { textContent: 'Started' }),
        h('th', { textContent: 'In Step Since' }),
        h('th', { textContent: 'Actions' })
      )
    );
    table.appendChild(thead);

    var tbody = h('tbody');
    for (var i = 0; i < flows.length; i++) {
      (function(flow) {
        var row = h('tr', null,
          h('td', { textContent: flow.chat_id || '-' }),
          h('td', { textContent: flow.flow_name || '-' }),
          h('td', { textContent: flow.current_step || '-' }),
          h('td', { textContent: fmtTime(flow.started_at) }),
          h('td', { textContent: fmtTime(flow.step_entered_at) }),
          h('td', null,
            h('button', {
              className: 'btn btn-danger', textContent: 'Force Complete',
              style: 'padding:3px 10px;font-size:11px;margin-right:4px',
              onClick: function(e) {
                e.stopPropagation();
                doForceComplete(flow.chat_id, flow.flow_name, gen);
              }
            }),
            h('button', {
              className: 'btn btn-primary', textContent: 'Replay...',
              style: 'padding:3px 10px;font-size:11px',
              onClick: function(e) {
                e.stopPropagation();
                showReplayModal(flow.chat_id, flow.flow_name, flow.current_step, gen);
              }
            })
          )
        );
        tbody.appendChild(row);
      })(flows[i]);
    }
    table.appendChild(tbody);
    panel.appendChild(table);
    container.appendChild(panel);
  }

  function doForceComplete(chatId, flowName, gen) {
    confirmDialog(
      'Force Complete Flow?',
      'This will force-complete the flow "' + flowName + '" for chat ' + chatId + '. This cannot be undone.',
      'Force Complete',
      'btn-danger',
      async function() {
        try {
          var res = await api('/instances/' + encodeURIComponent(state.instance) + '/flows/active/' + encodeURIComponent(chatId), { method: 'DELETE' });
          if (gen !== state.routeGeneration) return;
          if (res.status === 200) {
            showNotify(container, 'success', 'Flow force-completed for chat ' + chatId);
            loadActive();
          } else {
            showNotify(container, 'error', apiErrorMsg(res));
          }
        } catch (e) {
          showNotify(container, 'error', 'Error: ' + e.message);
        }
      }
    );
  }

  function showReplayModal(chatId, flowName, currentStep, gen) {
    var stepValue = currentStep || '';
    var modal = h('div', { className: 'modal' },
      h('h3', { textContent: 'Replay Flow' }),
      h('p', { textContent: 'Reset flow for chat ' + chatId + ' (' + flowName + ') to a specific step. Current step: ' + (currentStep || 'N/A'), style: 'font-size:13px;color:var(--text-dim);margin-bottom:12px' }),
      h('div', { className: 'form-group' },
        h('label', { className: 'form-label', textContent: 'Target Step' }),
        h('input', { className: 'form-input', type: 'text', value: stepValue, id: 'replay-step-input' }),
        h('div', { className: 'form-hint', textContent: 'The flow will resume from this step on the next interaction or timeout.' })
      ),
      h('div', { className: 'modal-actions' },
        h('button', { className: 'btn', textContent: 'Cancel', onClick: closeModal }),
        h('button', { className: 'btn btn-primary', textContent: 'Replay', onClick: async function() {
          var stepInput = document.getElementById('replay-step-input');
          var step = stepInput ? stepInput.value.trim() : '';
          if (!step) return;
          closeModal();
          await doReplay(chatId, step, gen);
        }})
      )
    );
    showModal(modal);
  }

  async function doReplay(chatId, step, gen) {
    try {
      var res = await api('/instances/' + encodeURIComponent(state.instance) + '/flows/active/' + encodeURIComponent(chatId) + '/replay', {
        method: 'POST',
        body: { step: step }
      });
      if (gen !== state.routeGeneration) return;
      if (res.status === 200) {
        showNotify(container, 'success', 'Flow replayed to step "' + step + '" for chat ' + chatId);
        loadActive();
      } else {
        showNotify(container, 'error', apiErrorMsg(res));
      }
    } catch (e) {
      showNotify(container, 'error', 'Error: ' + e.message);
    }
  }

  await loadActive();

  // Auto-refresh: 10s
  state.refreshTimer = setInterval(function() {
    if (gen !== state.routeGeneration) return;
    loadActive();
  }, 10000);
}

async function renderFlowHistory(gen, container) {
  clear(container);

  var histFilterName = '';
  var histFilterStatus = '';
  var histFilterChat = '';
  var histOffset = 0;
  var histLimit = 20;

  // Filter bar
  function buildHistoryFilter() {
    var bar = h('div', { className: 'filter-bar' });
    bar.appendChild(h('div', { className: 'filter-field' },
      h('label', { textContent: 'Flow Name' }),
      h('input', { type: 'text', value: histFilterName, placeholder: 'Flow name', onInput: function(e) { histFilterName = e.target.value; } })
    ));
    var statusSelect = h('select');
    var opts = [
      { value: '', label: 'All' },
      { value: 'completed', label: 'Completed' },
      { value: 'timed_out', label: 'Timed Out' },
      { value: 'force_completed', label: 'Force Completed' },
    ];
    for (var o of opts) {
      var opt = h('option', { value: o.value, textContent: o.label });
      if (o.value === histFilterStatus) opt.selected = true;
      statusSelect.appendChild(opt);
    }
    statusSelect.addEventListener('change', function(e) { histFilterStatus = e.target.value; });
    bar.appendChild(h('div', { className: 'filter-field' },
      h('label', { textContent: 'Status' }),
      statusSelect
    ));
    bar.appendChild(h('div', { className: 'filter-field' },
      h('label', { textContent: 'Chat ID' }),
      h('input', { type: 'text', value: histFilterChat, placeholder: 'Chat ID', onInput: function(e) { histFilterChat = e.target.value; } })
    ));
    bar.appendChild(h('button', { className: 'btn btn-primary', textContent: 'Apply', onClick: function() { histOffset = 0; loadHistory(); } }));
    bar.appendChild(h('button', { className: 'btn', textContent: 'Clear', onClick: function() {
      histFilterName = ''; histFilterStatus = ''; histFilterChat = '';
      histOffset = 0; loadHistory();
    }}));
    return bar;
  }

  container.appendChild(buildHistoryFilter());
  var histBody = h('div', { id: 'flow-history-body' });
  container.appendChild(histBody);

  async function loadHistory() {
    var body = document.getElementById('flow-history-body');
    if (!body) return;
    clear(body);
    body.appendChild(h('div', { className: 'loading', textContent: 'Loading flow history...' }));

    var params = 'limit=' + histLimit + '&offset=' + histOffset;
    if (histFilterName) params += '&flow_name=' + encodeURIComponent(histFilterName);
    if (histFilterStatus) params += '&status=' + encodeURIComponent(histFilterStatus);
    if (histFilterChat) params += '&chat_id=' + encodeURIComponent(histFilterChat);

    try {
      var res = await api('/instances/' + encodeURIComponent(state.instance) + '/flows/history?' + params);
      if (gen !== state.routeGeneration) return;
      if (res.status !== 200) {
        clear(body);
        body.appendChild(h('div', { className: 'notify notify-error', textContent: apiErrorMsg(res) }));
        return;
      }
      paintFlowHistory(res.data, body);
    } catch (e) {
      if (e.name === 'AbortError') return;
      clear(body);
      body.appendChild(h('div', { className: 'notify notify-error', textContent: 'Error: ' + e.message }));
    }
  }

  function paintFlowHistory(data, body) {
    clear(body);
    var panel = h('div', { className: 'panel' });
    panel.appendChild(h('div', { className: 'panel-title', textContent: 'Flow History', style: 'margin-bottom:12px' }));

    var history = data.history || [];
    if (history.length === 0) {
      panel.appendChild(h('div', { className: 'empty-state', textContent: 'No flow history found.' }));
      body.appendChild(panel);
      return;
    }

    var table = h('table', { className: 'data-table' });
    var thead = h('thead', null,
      h('tr', null,
        h('th', { textContent: 'Chat ID' }),
        h('th', { textContent: 'Flow Name' }),
        h('th', { textContent: 'Status' }),
        h('th', { textContent: 'Final Step' }),
        h('th', { textContent: 'Started' }),
        h('th', { textContent: 'Completed' })
      )
    );
    table.appendChild(thead);

    var tbody = h('tbody');
    for (var r of history) {
      tbody.appendChild(h('tr', null,
        h('td', { textContent: r.chat_id || '-' }),
        h('td', { textContent: r.flow_name || '-' }),
        h('td', null, h('span', { className: 'status ' + statusClass(r.status || 'unknown'), textContent: r.status || '-' })),
        h('td', { textContent: r.final_step || '-' }),
        h('td', { textContent: fmtTime(r.started_at) }),
        h('td', { textContent: fmtTime(r.completed_at) })
      ));
    }
    table.appendChild(tbody);
    panel.appendChild(table);

    // Pagination
    var total = data.total || 0;
    if (total > 0) {
      var pag = h('div', { className: 'pagination' },
        h('span', { textContent: 'Showing ' + (histOffset + 1) + '-' + Math.min(histOffset + history.length, total) + ' of ' + total })
      );
      if (histOffset > 0) {
        pag.appendChild(h('button', { className: 'btn', textContent: 'Previous', onClick: function() { histOffset = Math.max(0, histOffset - histLimit); loadHistory(); } }));
      }
      if (histOffset + histLimit < total) {
        pag.appendChild(h('button', { className: 'btn', textContent: 'Next', onClick: function() { histOffset += histLimit; loadHistory(); } }));
      }
      panel.appendChild(pag);
    }
    body.appendChild(panel);
  }

  await loadHistory();
}

// ── Flow definition viewer helper ────────────────────────────────
function renderFlowDefinitionCard(defJson) {
  try {
    var def = (typeof defJson === 'string') ? JSON.parse(defJson) : defJson;
  } catch (e) {
    return h('div', { className: 'notify notify-error', textContent: 'Invalid definition JSON' });
  }
  var card = h('div', { style: 'background:var(--bg-input);padding:12px;border-radius:var(--radius);margin:8px 0;font-size:12px' });

  var flowInfo = def.flow || {};
  card.appendChild(h('div', { style: 'margin-bottom:8px' },
    h('strong', { textContent: flowInfo.name || 'Unnamed' }),
    flowInfo.description ? h('span', { textContent: ' - ' + flowInfo.description, style: 'color:var(--text-dim)' }) : document.createTextNode('')
  ));
  if (flowInfo.start) {
    card.appendChild(h('div', { textContent: 'Start: ' + flowInfo.start, style: 'color:var(--text-dim);margin-bottom:6px' }));
  }

  var steps = def.steps || [];
  if (steps.length === 0) {
    card.appendChild(h('div', { textContent: 'No steps defined.', style: 'color:var(--text-dim)' }));
  } else {
    for (var s of steps) {
      var trans = (s.transitions || []).map(function(t) { return t.on + ' -> ' + t.target; }).join(', ');
      var textPreview = (s.text || '').substring(0, 60);
      if ((s.text || '').length > 60) textPreview += '...';
      card.appendChild(h('div', { style: 'margin:2px 0;padding:4px;border-left:2px solid var(--border);padding-left:8px' },
        h('span', { textContent: '[' + (s.kind || '?') + '] ', style: 'color:var(--blue);font-weight:600' }),
        h('span', { textContent: s.id || '?' }),
        textPreview ? h('span', { textContent: ' - "' + textPreview + '"', style: 'color:var(--text-dim)' }) : document.createTextNode(''),
        trans ? h('div', { textContent: 'Transitions: ' + trans, style: 'color:var(--text-dim);font-size:11px;margin-top:2px' }) : document.createTextNode('')
      ));
    }
  }
  return card;
}

// ── Review Queue subtab ─────────────────────────────────────────
async function renderReviewQueue(gen, container) {
  clear(container);
  container.appendChild(h('div', { className: 'loading', textContent: 'Loading pending reviews...' }));

  async function loadPending() {
    try {
      var res = await api('/instances/' + encodeURIComponent(state.instance) + '/flows/versions/pending');
      if (gen !== state.routeGeneration) return;
      if (res.status !== 200) {
        clear(container);
        container.appendChild(h('div', { className: 'notify notify-error', textContent: apiErrorMsg(res) }));
        return;
      }
      paintPending(res.data);
    } catch (e) {
      if (e.name === 'AbortError') return;
      clear(container);
      container.appendChild(h('div', { className: 'notify notify-error', textContent: 'Error: ' + e.message }));
    }
  }

  function paintPending(data) {
    clear(container);
    var panel = h('div', { className: 'panel' });
    panel.appendChild(h('div', { className: 'panel-title', textContent: 'Review Queue', style: 'margin-bottom:12px' }));

    var versions = data.versions || [];
    _pendingBadgeCount = versions.length;

    if (versions.length === 0) {
      panel.appendChild(h('div', { className: 'empty-state', textContent: 'No versions pending review.' }));
      container.appendChild(panel);
      return;
    }

    var table = h('table', { className: 'data-table' });
    var thead = h('thead', null,
      h('tr', null,
        h('th', { textContent: 'Flow Name' }),
        h('th', { textContent: 'Version' }),
        h('th', { textContent: 'Steps' }),
        h('th', { textContent: 'Created' }),
        h('th', { textContent: 'Actions' })
      )
    );
    table.appendChild(thead);

    var tbody = h('tbody');
    for (var i = 0; i < versions.length; i++) {
      (function(ver) {
        var stepCount = '-';
        try {
          var def = JSON.parse(ver.definition_json);
          stepCount = (def.steps || []).length;
        } catch (e) {}

        var detailRow = null;
        var row = h('tr', { style: 'cursor:pointer', onClick: function() {
          if (detailRow && detailRow.parentNode) {
            detailRow.parentNode.removeChild(detailRow);
            detailRow = null;
          } else {
            detailRow = h('tr', { className: 'event-detail-row' },
              h('td', { colSpan: 5 }, renderFlowDefinitionCard(ver.definition_json))
            );
            row.parentNode.insertBefore(detailRow, row.nextSibling);
          }
        }},
          h('td', { textContent: ver.flow_name }),
          h('td', { textContent: 'v' + ver.version }),
          h('td', { textContent: String(stepCount) }),
          h('td', { textContent: fmtTime(ver.created_at) }),
          h('td', null,
            h('button', {
              className: 'btn btn-primary', textContent: 'Approve',
              style: 'padding:3px 10px;font-size:11px;margin-right:4px',
              onClick: function(e) {
                e.stopPropagation();
                doApprove(ver.flow_name, ver.version, gen);
              }
            }),
            h('button', {
              className: 'btn btn-danger', textContent: 'Reject',
              style: 'padding:3px 10px;font-size:11px',
              onClick: function(e) {
                e.stopPropagation();
                showRejectModal(ver.flow_name, ver.version, gen);
              }
            })
          )
        );
        tbody.appendChild(row);
      })(versions[i]);
    }
    table.appendChild(tbody);
    panel.appendChild(table);
    container.appendChild(panel);
  }

  function doApprove(flowName, version, gen) {
    confirmDialog(
      'Approve Flow Version?',
      'This will approve and activate "' + flowName + '" v' + version + '. The currently active version (if any) will be deactivated.',
      'Approve',
      'btn-primary',
      async function() {
        try {
          var res = await api('/instances/' + encodeURIComponent(state.instance) + '/flows/versions/' + encodeURIComponent(flowName) + '/' + version + '/approve', { method: 'POST' });
          if (gen !== state.routeGeneration) return;
          if (res.status === 200) {
            showNotify(container, 'success', 'Version approved and activated');
            loadPending();
          } else {
            showNotify(container, 'error', apiErrorMsg(res));
          }
        } catch (e) {
          showNotify(container, 'error', 'Error: ' + e.message);
        }
      }
    );
  }

  function showRejectModal(flowName, version, gen) {
    var modal = h('div', { className: 'modal' },
      h('h3', { textContent: 'Reject Flow Version' }),
      h('p', { textContent: 'Reject "' + flowName + '" v' + version + '.', style: 'font-size:13px;color:var(--text-dim);margin-bottom:12px' }),
      h('div', { className: 'form-group' },
        h('label', { className: 'form-label', textContent: 'Reason (optional)' }),
        h('textarea', { className: 'form-input', id: 'reject-note-input', rows: 3, placeholder: 'Why is this being rejected?' })
      ),
      h('div', { className: 'modal-actions' },
        h('button', { className: 'btn', textContent: 'Cancel', onClick: closeModal }),
        h('button', { className: 'btn btn-danger', textContent: 'Reject', onClick: async function() {
          var noteInput = document.getElementById('reject-note-input');
          var note = noteInput ? noteInput.value.trim() : '';
          closeModal();
          try {
            var body = {};
            if (note) body.note = note;
            var res = await api('/instances/' + encodeURIComponent(state.instance) + '/flows/versions/' + encodeURIComponent(flowName) + '/' + version + '/reject', {
              method: 'POST', body: body
            });
            if (gen !== state.routeGeneration) return;
            if (res.status === 200) {
              showNotify(container, 'success', 'Version rejected');
              loadPending();
            } else {
              showNotify(container, 'error', apiErrorMsg(res));
            }
          } catch (e) {
            showNotify(container, 'error', 'Error: ' + e.message);
          }
        }})
      )
    );
    showModal(modal);
  }

  await loadPending();

  // Auto-refresh: 10s
  state.refreshTimer = setInterval(function() {
    if (gen !== state.routeGeneration) return;
    loadPending();
  }, 10000);
}

// ── Versions subtab ─────────────────────────────────────────────
async function renderFlowVersions(gen, container) {
  clear(container);

  var verFilterName = '';
  var verFilterStatus = '';
  var verFilterSource = '';
  var verOffset = 0;
  var verLimit = 20;

  function buildVersionsFilter() {
    var bar = h('div', { className: 'filter-bar' });
    bar.appendChild(h('div', { className: 'filter-field' },
      h('label', { textContent: 'Flow Name' }),
      h('input', { type: 'text', value: verFilterName, placeholder: 'Flow name', onInput: function(e) { verFilterName = e.target.value; } })
    ));
    var statusSelect = h('select');
    var statusOpts = [
      { value: '', label: 'All' },
      { value: 'draft', label: 'Draft' },
      { value: 'validated', label: 'Validated' },
      { value: 'pending_review', label: 'Pending Review' },
      { value: 'active', label: 'Active' },
      { value: 'deactivated', label: 'Deactivated' },
      { value: 'rejected', label: 'Rejected' },
    ];
    for (var o of statusOpts) {
      var opt = h('option', { value: o.value, textContent: o.label });
      if (o.value === verFilterStatus) opt.selected = true;
      statusSelect.appendChild(opt);
    }
    statusSelect.addEventListener('change', function(e) { verFilterStatus = e.target.value; });
    bar.appendChild(h('div', { className: 'filter-field' },
      h('label', { textContent: 'Status' }),
      statusSelect
    ));
    var sourceSelect = h('select');
    var sourceOpts = [
      { value: '', label: 'All' },
      { value: 'agent', label: 'Agent' },
      { value: 'operator', label: 'Operator' },
    ];
    for (var o of sourceOpts) {
      var opt = h('option', { value: o.value, textContent: o.label });
      if (o.value === verFilterSource) opt.selected = true;
      sourceSelect.appendChild(opt);
    }
    sourceSelect.addEventListener('change', function(e) { verFilterSource = e.target.value; });
    bar.appendChild(h('div', { className: 'filter-field' },
      h('label', { textContent: 'Source' }),
      sourceSelect
    ));
    bar.appendChild(h('button', { className: 'btn btn-primary', textContent: 'Apply', onClick: function() { verOffset = 0; loadVersions(); } }));
    bar.appendChild(h('button', { className: 'btn', textContent: 'Clear', onClick: function() {
      verFilterName = ''; verFilterStatus = ''; verFilterSource = '';
      verOffset = 0; loadVersions();
    }}));
    return bar;
  }

  container.appendChild(buildVersionsFilter());
  var verBody = h('div', { id: 'flow-versions-body' });
  container.appendChild(verBody);

  async function loadVersions() {
    var body = document.getElementById('flow-versions-body');
    if (!body) return;
    clear(body);
    body.appendChild(h('div', { className: 'loading', textContent: 'Loading flow versions...' }));

    var params = 'limit=' + verLimit + '&offset=' + verOffset;
    if (verFilterName) params += '&flow_name=' + encodeURIComponent(verFilterName);
    if (verFilterStatus) params += '&status=' + encodeURIComponent(verFilterStatus);
    if (verFilterSource) params += '&source=' + encodeURIComponent(verFilterSource);

    try {
      var res = await api('/instances/' + encodeURIComponent(state.instance) + '/flows/versions?' + params);
      if (gen !== state.routeGeneration) return;
      if (res.status !== 200) {
        clear(body);
        body.appendChild(h('div', { className: 'notify notify-error', textContent: apiErrorMsg(res) }));
        return;
      }
      paintVersions(res.data, body);
    } catch (e) {
      if (e.name === 'AbortError') return;
      clear(body);
      body.appendChild(h('div', { className: 'notify notify-error', textContent: 'Error: ' + e.message }));
    }
  }

  function paintVersions(data, body) {
    clear(body);
    var panel = h('div', { className: 'panel' });
    panel.appendChild(h('div', { className: 'panel-title', textContent: 'Flow Versions', style: 'margin-bottom:12px' }));

    var versions = data.versions || [];
    if (versions.length === 0) {
      panel.appendChild(h('div', { className: 'empty-state', textContent: 'No flow versions found.' }));
      body.appendChild(panel);
      return;
    }

    var table = h('table', { className: 'data-table' });
    var thead = h('thead', null,
      h('tr', null,
        h('th', { textContent: 'Flow Name' }),
        h('th', { textContent: 'Version' }),
        h('th', { textContent: 'Source' }),
        h('th', { textContent: 'Status' }),
        h('th', { textContent: 'Created' }),
        h('th', { textContent: 'Created By' }),
        h('th', { textContent: 'Actions' })
      )
    );
    table.appendChild(thead);

    var tbody = h('tbody');
    for (var i = 0; i < versions.length; i++) {
      (function(ver) {
        var canActivate = (ver.status === 'deactivated' || ver.status === 'validated' || ver.status === 'pending_review');
        var detailRow = null;

        var actionsCell = h('td');
        if (canActivate) {
          actionsCell.appendChild(h('button', {
            className: 'btn btn-primary', textContent: 'Activate',
            style: 'padding:3px 10px;font-size:11px;margin-right:4px',
            onClick: function(e) {
              e.stopPropagation();
              doActivate(ver.flow_name, ver.version, gen);
            }
          }));
        }
        actionsCell.appendChild(h('button', {
          className: 'btn', textContent: 'View',
          style: 'padding:3px 10px;font-size:11px',
          onClick: function(e) {
            e.stopPropagation();
            if (detailRow && detailRow.parentNode) {
              detailRow.parentNode.removeChild(detailRow);
              detailRow = null;
            } else {
              detailRow = h('tr', { className: 'event-detail-row' },
                h('td', { colSpan: 7 }, renderFlowDefinitionCard(ver.definition_json))
              );
              row.parentNode.insertBefore(detailRow, row.nextSibling);
            }
          }
        }));

        var row = h('tr', null,
          h('td', { textContent: ver.flow_name }),
          h('td', { textContent: 'v' + ver.version }),
          h('td', { textContent: ver.source || '-' }),
          h('td', null, h('span', { className: 'status ' + statusClass(ver.status || 'unknown'), textContent: ver.status || '-' })),
          h('td', { textContent: fmtTime(ver.created_at) }),
          h('td', { textContent: ver.created_by || '-' }),
          actionsCell
        );
        tbody.appendChild(row);
      })(versions[i]);
    }
    table.appendChild(tbody);
    panel.appendChild(table);

    // Pagination
    var total = data.total || 0;
    if (total > 0) {
      var pag = h('div', { className: 'pagination' },
        h('span', { textContent: 'Showing ' + (verOffset + 1) + '-' + Math.min(verOffset + versions.length, total) + ' of ' + total })
      );
      if (verOffset > 0) {
        pag.appendChild(h('button', { className: 'btn', textContent: 'Previous', onClick: function() { verOffset = Math.max(0, verOffset - verLimit); loadVersions(); } }));
      }
      if (verOffset + verLimit < total) {
        pag.appendChild(h('button', { className: 'btn', textContent: 'Next', onClick: function() { verOffset += verLimit; loadVersions(); } }));
      }
      panel.appendChild(pag);
    }
    body.appendChild(panel);
  }

  function doActivate(flowName, version, gen) {
    confirmDialog(
      'Activate Flow Version?',
      'This will activate "' + flowName + '" v' + version + '. The currently active version (if any) will be deactivated.',
      'Activate',
      'btn-primary',
      async function() {
        try {
          var res = await api('/instances/' + encodeURIComponent(state.instance) + '/flows/versions/' + encodeURIComponent(flowName) + '/' + version + '/activate', { method: 'POST' });
          if (gen !== state.routeGeneration) return;
          if (res.status === 200) {
            showNotify(container, 'success', 'Version activated');
            loadVersions();
          } else {
            showNotify(container, 'error', apiErrorMsg(res));
          }
        } catch (e) {
          showNotify(container, 'error', 'Error: ' + e.message);
        }
      }
    );
  }

  await loadVersions();
}

// ── Audit Log subtab ────────────────────────────────────────────
async function renderFlowAudit(gen, container) {
  clear(container);

  var auditFilterName = '';
  var auditOffset = 0;
  var auditLimit = 20;

  function buildAuditFilter() {
    var bar = h('div', { className: 'filter-bar' });
    bar.appendChild(h('div', { className: 'filter-field' },
      h('label', { textContent: 'Flow Name' }),
      h('input', { type: 'text', value: auditFilterName, placeholder: 'Flow name', onInput: function(e) { auditFilterName = e.target.value; } })
    ));
    bar.appendChild(h('button', { className: 'btn btn-primary', textContent: 'Apply', onClick: function() { auditOffset = 0; loadAudit(); } }));
    bar.appendChild(h('button', { className: 'btn', textContent: 'Clear', onClick: function() {
      auditFilterName = '';
      auditOffset = 0; loadAudit();
    }}));
    return bar;
  }

  container.appendChild(buildAuditFilter());
  var auditBody = h('div', { id: 'flow-audit-body' });
  container.appendChild(auditBody);

  async function loadAudit() {
    var body = document.getElementById('flow-audit-body');
    if (!body) return;
    clear(body);
    body.appendChild(h('div', { className: 'loading', textContent: 'Loading audit log...' }));

    var params = 'limit=' + auditLimit + '&offset=' + auditOffset;
    if (auditFilterName) params += '&flow_name=' + encodeURIComponent(auditFilterName);

    try {
      var res = await api('/instances/' + encodeURIComponent(state.instance) + '/flows/audit?' + params);
      if (gen !== state.routeGeneration) return;
      if (res.status !== 200) {
        clear(body);
        body.appendChild(h('div', { className: 'notify notify-error', textContent: apiErrorMsg(res) }));
        return;
      }
      paintAudit(res.data, body);
    } catch (e) {
      if (e.name === 'AbortError') return;
      clear(body);
      body.appendChild(h('div', { className: 'notify notify-error', textContent: 'Error: ' + e.message }));
    }
  }

  function paintAudit(data, body) {
    clear(body);
    var panel = h('div', { className: 'panel' });
    panel.appendChild(h('div', { className: 'panel-title', textContent: 'Flow Audit Log', style: 'margin-bottom:12px' }));

    var entries = data.entries || [];
    if (entries.length === 0) {
      panel.appendChild(h('div', { className: 'empty-state', textContent: 'No audit log entries found.' }));
      body.appendChild(panel);
      return;
    }

    var table = h('table', { className: 'data-table' });
    var thead = h('thead', null,
      h('tr', null,
        h('th', { textContent: 'Time' }),
        h('th', { textContent: 'Flow' }),
        h('th', { textContent: 'Version' }),
        h('th', { textContent: 'Event' }),
        h('th', { textContent: 'Actor' }),
        h('th', { textContent: 'Detail' })
      )
    );
    table.appendChild(thead);

    var tbody = h('tbody');
    for (var r of entries) {
      tbody.appendChild(h('tr', null,
        h('td', { textContent: fmtTime(r.created_at) }),
        h('td', { textContent: r.flow_name || '-' }),
        h('td', { textContent: r.version != null ? 'v' + r.version : '-' }),
        h('td', { textContent: r.event || '-' }),
        h('td', { textContent: r.actor || '-' }),
        h('td', { textContent: r.detail || '-', style: 'max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap' })
      ));
    }
    table.appendChild(tbody);
    panel.appendChild(table);

    // Pagination
    var total = data.total || 0;
    if (total > 0) {
      var pag = h('div', { className: 'pagination' },
        h('span', { textContent: 'Showing ' + (auditOffset + 1) + '-' + Math.min(auditOffset + entries.length, total) + ' of ' + total })
      );
      if (auditOffset > 0) {
        pag.appendChild(h('button', { className: 'btn', textContent: 'Previous', onClick: function() { auditOffset = Math.max(0, auditOffset - auditLimit); loadAudit(); } }));
      }
      if (auditOffset + auditLimit < total) {
        pag.appendChild(h('button', { className: 'btn', textContent: 'Next', onClick: function() { auditOffset += auditLimit; loadAudit(); } }));
      }
      panel.appendChild(pag);
    }
    body.appendChild(panel);
  }

  await loadAudit();
}

// ── Usage tab ────────────────────────────────────────────────────
async function renderUsage(gen) {
  var content = document.getElementById('tab-content');
  clear(content);

  var currentWindow = '24h';

  async function load(win) {
    currentWindow = win;
    clear(content);

    // Window selector
    var selector = h('div', { className: 'window-select', style: 'margin-bottom:16px' });
    var windows = ['1h', '24h', '7d', '30d'];
    for (var i = 0; i < windows.length; i++) {
      (function(w) {
        selector.appendChild(h('button', {
          className: 'window-btn' + (w === currentWindow ? ' active' : ''),
          textContent: w,
          onClick: function() { load(w); }
        }));
      })(windows[i]);
    }
    content.appendChild(selector);
    content.appendChild(h('div', { className: 'loading', textContent: 'Loading usage data...' }));

    try {
      var res = await api('/instances/' + encodeURIComponent(state.instance) + '/usage?window=' + win);
      if (gen !== state.routeGeneration) return;
      if (res.status !== 200) {
        // Remove loading
        var loading = content.querySelector('.loading');
        if (loading) loading.remove();
        content.appendChild(h('div', { className: 'notify notify-error', textContent: (res.data && res.data.error) || 'Failed to load usage' }));
        return;
      }
      paintUsage(res.data, selector);
    } catch (e) {
      if (e.name === 'AbortError') return;
      var ld = content.querySelector('.loading');
      if (ld) ld.remove();
      content.appendChild(h('div', { className: 'notify notify-error', textContent: 'Error: ' + e.message }));
    }
  }

  function paintUsage(data, selector) {
    clear(content);
    content.appendChild(selector);

    var usage = data.usage || {};

    if (!data.data_available) {
      content.appendChild(h('div', { className: 'empty-state', textContent: 'No usage data available for this window.' }));
      return;
    }

    var grid = h('div', { className: 'usage-grid' });
    var stats = [
      { label: 'Input Tokens', value: fmtNum(usage.input_tokens) },
      { label: 'Output Tokens', value: fmtNum(usage.output_tokens) },
      { label: 'Total Tokens', value: fmtNum(usage.total_tokens) },
      { label: 'Requests', value: fmtNum(usage.request_count) },
    ];
    for (var s of stats) {
      grid.appendChild(h('div', { className: 'usage-stat' },
        h('div', { className: 'usage-stat-label', textContent: s.label }),
        h('div', { className: 'usage-stat-value', textContent: s.value })
      ));
    }
    content.appendChild(grid);
  }

  await load(currentWindow);
}

// ── Health status ────────────────────────────────────────────────
async function refreshHealth() {
  try {
    var resp = await fetch('/api/health');
    var data = await resp.json();
    var el = document.getElementById('health-status');
    if (el) {
      el.textContent = data.status === 'ok' ? 'API: Connected' : 'API: Error';
      el.style.color = data.status === 'ok' ? 'var(--green)' : 'var(--red)';
    }
  } catch (e) {
    var el = document.getElementById('health-status');
    if (el) { el.textContent = 'API: Disconnected'; el.style.color = 'var(--red)'; }
  }
}

// ── Init ─────────────────────────────────────────────────────────
route();
refreshHealth();
setInterval(refreshHealth, 15000);
</script>
